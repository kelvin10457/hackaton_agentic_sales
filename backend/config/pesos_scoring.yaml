# Motor de scoring determinista — ver Biblia §5
# El LLM extrae señales. Este archivo + tools/calcular_score.py hacen el resto.
# NUNCA se le pide un número al LLM.

interes:
  tope: 25
  pidio_asesor: 12
  completo_quiz_o_propuesta: 7   # completo_quiz (B2C) o solicito_propuesta (B2B)
  mensajes:
    alto: { min_mensajes: 8, puntos: 4 }
    medio: { min_mensajes: 4, max_mensajes: 7, puntos: 2 }  # no acumula con "alto"
  objetivo:
    bono_principal: 6      # objetivo en [invertir, capacitar_equipo, licenciar]
    objetivos_bono_principal: ["invertir", "capacitar_equipo", "licenciar"]
    bono_aprender: 2       # objetivo == aprender

presupuesto:
  tope: 25
  b2c:
    bandas:
      - { min: 25000, puntos: 25 }
      - { min: 10000, max: 24999, puntos: 20 }
      - { min: 3000, max: 9999, puntos: 14 }
      - { min: 500, max: 2999, puntos: 8 }
      - { min: 0, max: 499, puntos: 3 }
    si_null: 0
  b2b:
    colaboradores:
      - { min: 200, puntos: 15 }
      - { min: 50, max: 199, puntos: 10 }
      - { min: 10, max: 49, puntos: 6 }
      - { min: 0, max: 9, puntos: 2 }
    bono_presupuesto:
      alto: { min_usd: 5000, puntos: 10 }
      bajo: { min_usd: 0.01, puntos: 5 }   # >0 pero <5000

perfil:
  tope: 25
  b2c:
    experiencia:
      ninguna: 15
      basica: 15
      intermedia: 10
      avanzada: 5
    cedula_valida: 6
    email_valido: 4
  b2b:
    es_decisor_true: 15
    es_decisor_false: 4
    ruc_valido: 6
    email_corporativo: 4

urgencia:
  tope: 25
  inmediato: 25
  "1-3m": 18
  "3-6m": 10
  mas_6m: 4
  si_null: 0

bandas:
  caliente: { min: 70, max: 100 }
  tibio: { min: 40, max: 69 }
  frio: { min: 0, max: 39 }
