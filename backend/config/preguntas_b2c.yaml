identificacion:
  - id: nombre
    texto: "Encantado. ¿Cómo te llamas?"
    momento: mensaje_2
    campo: identidad.nombre
  - id: email
    texto: "Tu perfil salió {perfil_riesgo}. ¿A qué correo te envío tu resultado y una ruta de 3 pasos?"
    momento: post_quiz
    campo: identidad.email
  - id: cedula
    texto: "Para que un asesor te contacte necesito tu cédula. ¿Me la compartes?"
    momento: solo_si_pide_asesor
    campo: identidad.documento
    opcional: true

calificacion:
  - id: objetivo
    texto: "¿Qué te gustaría lograr con tu dinero?"
    senal: objetivo
  - id: monto
    texto: "¿Con qué monto estarías pensando empezar?"
    senal: monto_declarado_usd
  - id: horizonte
    texto: "¿En cuánto tiempo te gustaría ver resultados?"
    senal: horizonte
  - id: experiencia
    texto: "¿Has invertido antes?"
    senal: experiencia_inversion
