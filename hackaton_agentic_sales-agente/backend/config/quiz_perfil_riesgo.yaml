fuente: FA-003
preguntas:
  - id: q1
    texto: "Si tu inversión bajara un 20% en un mes, ¿qué harías?"
    opciones:
      - { texto: "Vender todo para no perder más", puntos: 0 }
      - { texto: "Esperar y no hacer nada", puntos: 1 }
      - { texto: "Comprar más, está barato", puntos: 2 }
  - id: q2
    texto: "¿En cuánto tiempo necesitarías recuperar este dinero?"
    opciones:
      - { texto: "En menos de un año", puntos: 0 }
      - { texto: "Entre 1 y 5 años", puntos: 1 }
      - { texto: "Más de 5 años", puntos: 2 }
  - id: q3
    texto: "¿Qué prefieres?"
    opciones:
      - { texto: "Ganar poco, pero seguro", puntos: 0 }
      - { texto: "Un equilibrio entre riesgo y retorno", puntos: 1 }
      - { texto: "Máximo retorno, aunque haya riesgo", puntos: 2 }

rubrica:  # 0-6 puntos totales
  - { min: 0, max: 1, perfil: "conservador" }
  - { min: 2, max: 4, perfil: "moderado" }
  - { min: 5, max: 6, perfil: "agresivo" }
